name: Build & Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip deployment (build & push only)"
        type: boolean
        default: false

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io

jobs:
  # ─── Test ──────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Format check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "File berikut tidak terformat:"; echo "$UNFORMATTED"; exit 1
          fi

      - name: Vet & Test
        run: |
          go mod download
          go vet ./...
          go test ./... -v -race

  # ─── Build & Push Docker Image ─────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: images
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "app=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Image Tag: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.images.outputs.app }}:${{ steps.meta.outputs.VERSION }}
            ${{ steps.images.outputs.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.images.outputs.app }}:${{ steps.meta.outputs.VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Deploy to Production ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.skip_deploy }}
    environment: production
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          source: "docker-compose.prod.yml"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: GHCR_TOKEN,IMAGE_TAG
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"

            # Pakai compose produksi (image dari GHCR)
            mv -f docker-compose.prod.yml docker-compose.yml

            # Login ke GHCR & pull image terbaru
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github --password-stdin
            docker compose pull

            # Deploy (recreate hanya service yang berubah)
            docker compose up -d --remove-orphans

            # Bersihkan image lama
            docker image prune -f

            # Health check
            echo "Menunggu service siap..."
            sleep 8
            APP_PORT=$(grep -oP '^PORT=\K.*' .env 2>/dev/null || echo 3000)
            curl -sf "http://localhost:${APP_PORT}/health" > /dev/null \
              && echo "✅ wa-gateway OK" \
              || echo "❌ wa-gateway belum siap"

      - name: Deployment summary
        run: |
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Host:** \`${{ secrets.DEPLOY_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ needs.build.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** Deployed" >> "$GITHUB_STEP_SUMMARY"
